<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire Client Simple</title>
    <style>
        body {
            background-image: linear-gradient(rgba(0, 3, 57, 0.838), rgba(213, 213, 213, 0));
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .form-container {
            width: 400px;
            margin: 60px auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #4CAF50;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }
         .h {
            position: fixed;
        }
        /* Style du bouton flottant Accueil */
.h {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1000; /* S'assure qu'il reste au-dessus du contenu */
    display: flex;
    align-items: center;
    justify-content: center;
    width: 50px;
    height: 50px;
    background: rgba(255, 255, 255, 0.1); /* Effet transparent */
    backdrop-filter: blur(10px); /* Flou d'arrière-plan */
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50%; /* Bouton rond */
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-decoration: none;
}

/* Style de l'icône à l'intérieur */
.home-icon {
    width: 24px;
    height: 24px;
    filter: invert(1); /* Force l'icône en blanc si elle est noire à l'origine */
    transition: transform 0.3s ease;
}

/* Effets au Survol (Hover) */
.h:hover {
    background: #000679; /* Couleur assortie à vos boutons "Shop Now" */
    transform: scale(1.1) rotate(5deg);
    border-color: #fff;
    box-shadow: 0 8px 25px rgba(0, 6, 121, 0.5);
}

.h:hover .home-icon {
    transform: scale(1.1);
    filter: invert(1); /* Garde l'icône blanche */
}

/* Optionnel : Adaptation pour mobile */
@media (max-width: 768px) {
    .h {
        top: 15px;
        left: 15px;
        width: 45px;
        height: 45px;
    }
}
    </style>
</head>
<body>
      <a class="h" href="index.html"><img src="homelogin.svg" alt=""></a>
    <div class="form-container">
        <h1>Formulaire Client</h1>
        <form action="#" method="post">
            <div class="form-group">
                <label for="nom">Nom :</label>
                <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
            </div>

            <div class="form-group">
                <label for="prenom">Prénom :</label>
                <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required>
            </div>

            <div class="form-group">
                <label for="telephone">Téléphone :</label>
                <input type="tel" id="telephone" name="telephone" placeholder="Ex: 0600000000" required>
            </div>

            <div class="form-group">
                <label for="email">Email :</label>
                <input type="email" id="email" name="email" placeholder="exemple@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="adresse">Adresse :</label>
                <input type="text" id="adresse" name="adresse" placeholder="Votre adresse complète" required>
            </div>

            <div class="form-group">
                <button type="submit">Envoyer</button>
            </div>
        </form>
    </div>
</body>
</html>
