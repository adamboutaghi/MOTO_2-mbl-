<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: rgba(255, 255, 255, 0.797);
        }

        body {
            background-image: linear-gradient(rgba(0, 3, 57, 0.838), rgba(213, 213, 213, 0));
            
        }

        a {
            text-decoration: none;
            color: rgb(0, 76, 239);
        }

        a:hover {
            text-decoration: underline;
        }

        .A {
            justify-content: center;
            display: flex;
            align-items: center;
            min-height: 100vh;
            background-color: rgba(81, 81, 81, 0.2);
        }

        .B {
            position: relative;
            width: 450px;
            border: 4px solid black;
            border-radius: 20px;
            padding: 7.5em 2.5em 4em 2.5em;
            box-shadow: 0px 0px 10px 2px rgba(0, 0, 0, 0.3);

        }

        .C {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 140PX;
            height: 50PX;
            border-radius: 0 0 20PX 20PX;
            background-color: rgb(13, 12, 12);


        }

        .C span {
            font-size: 30px;
        }

        .D {
            position: relative;
            display: flex;
            flex-direction: column-reverse;
            margin: 20px 0;
        }

        .input-field {
            width: 100%;
            height: 55px;
            background-color: rgba(0, 0, 0, 0.973);
            padding-inline: 20px 50px;
            border: 2px solid rgb(255, 255, 255);
            border-radius: 15px;
        }

        #user {
            margin-bottom: 20px;
        }

        .label {

            top: 15px;
            margin-left: 20px;
            margin-bottom: 5PX;
        }

        .input-submit {
            width: 100%;
            height: 40PX;
            border-radius: 15px;
            cursor: pointer;
            color: rgb(0, 0, 0);
            font-size: 20PX;
            font-style: italic;
            border: solid 3px rgb(0, 0, 0);
            background-color: rgba(255, 255, 255, 0.71);
        }

        .h {
            position: fixed;
        }
        video{
            width: 100%;
            height: 100px;
        }
    </style>
</head>

<body>
    <a class="h" href="index.html"><img src="homelogin.svg" alt=""></a>
    <form action="">
        <div class="A">
            <div class="B">
                <div class="C">
                    <span>Login</span>
                </div>
                <div class="D">
                    <input type="text" name="" id="user" class="input-field"
                        placeholder="Enter your e-mail or phone number " required>
                    <label for="user" class="label"></label>
                </div>

                <div class="D">
                    <button type="submit" class="input-submit" >Next</button>
                </div>
            </div>
        </div>
        </div>
    </form>
</body>

</html>
