<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="account.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <a class="h" href="index.html"><img src="homelogin.svg" alt=""></a>
<form action="">
    <div class="A">
        <div class="B">
            <div class="C">
                <span>Login</span>
            </div>
            <div class="D">
                <input type="text" name="" id="user" class="input-field" required>
                <label for="user" class="label">Email or number phone &nbsp;&nbsp;<i
                        class="fa-regular fa-user"></i></label>
            </div>
            <div class="D">
                <input type="password" name="" id="pass" class="input-field" required>
                <label for="pass" class="label">Password <i class="fa-solid fa-lock"></i></label>
            </div>
            <div class="E">
                <div class="F">
                    <input type="checkbox" name="" id="remember">
                    <label for="remember">Remember me</label>
                </div>
                <div class="forgot">
                    <a href="forgot.html">Forgot password ?</a>
                </div>
                <div class="D">
                    <button type="submit" class="input-submit">Login</button>
                </div>
                <div class="register">
                    <span>Don't have an account? <a href="account2.html">Register</a></span>
                </div>
            </div>
        </div>
    </div>

</form>
</body>

</html>
