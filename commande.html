<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commander une Moto - ALIEN MOTO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        /* ===== VARIABLES ===== */
        :root {
            --primary: #00033d;
            --secondary: #ff6600;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --bg-gradient: linear-gradient(135deg, rgba(0, 3, 57, 0.95) 0%, rgba(255, 102, 0, 0.1) 100%);
        }

        /* ===== BASE STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 40px 20px;
            color: var(--dark);
        }

        .home-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--secondary);
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(255, 102, 0, 0.3);
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            font-size: 24px;
        }

        .home-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 102, 0, 0.5);
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: var(--primary);
            font-size: 2rem;
            font-weight: 700;
        }

        .form-subtitle {
            text-align: center;
            color: var(--secondary);
            margin-bottom: 30px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 25px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(255, 102, 0, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--secondary) 0%, #ff8533 100%);
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 102, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 102, 0, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .form-group {
                margin-bottom: 20px;
            }
        }
        /* Style du bouton flottant Accueil */
.h {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1000; /* S'assure qu'il reste au-dessus du contenu */
    display: flex;
    align-items: center;
    justify-content: center;
    width: 50px;
    height: 50px;
    background: rgba(255, 255, 255, 0.1); /* Effet transparent */
    backdrop-filter: blur(10px); /* Flou d'arrière-plan */
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50%; /* Bouton rond */
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-decoration: none;
}

/* Style de l'icône à l'intérieur */
.home-icon {
    width: 24px;
    height: 24px;
    filter: invert(1); /* Force l'icône en blanc si elle est noire à l'origine */
    transition: transform 0.3s ease;
}

/* Effets au Survol (Hover) */
.h:hover {
    background: #000679; /* Couleur assortie à vos boutons "Shop Now" */
    transform: scale(1.1) rotate(5deg);
    border-color: #fff;
    box-shadow: 0 8px 25px rgba(0, 6, 121, 0.5);
}

.h:hover .home-icon {
    transform: scale(1.1);
    filter: invert(1); /* Garde l'icône blanche */
}

/* Optionnel : Adaptation pour mobile */
@media (max-width: 768px) {
    .h {
        top: 15px;
        left: 15px;
        width: 45px;
        height: 45px;
    }
}
    </style>
</head>
<body>
    <a class="h" href="index.html" title="Retour à l'accueil">
        <i class="fas fa-home"></i>
    </a>
    <div class="container">
        <h1><i class="fas fa-shopping-cart"></i> Passer une Commande</h1>
        <p class="form-subtitle">Remplissez le formulaire ci-dessous pour commander votre moto</p>
        
        <form action="traitement_commande.php" method="POST">
            <!-- Informations sur la moto -->
            <div class="form-group">
                <label for="modele"><i class="fas fa-motorcycle"></i> Modèle de la moto</label>
                <input type="text" id="modele" name="modele" placeholder="Ex: Yamaha MT-07" required>
            </div>

            <!-- Informations personnelles -->
            <div class="form-group">
                <label for="nom"><i class="fas fa-user"></i> Nom</label>
                <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
            </div>

            <div class="form-group">
                <label for="prenom">Prénom</label>
                <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required>
            </div>

            <div class="form-group">
                <label for="telephone"><i class="fas fa-phone"></i> Téléphone</label>
                <input type="tel" id="telephone" name="telephone" placeholder="Ex: +212612345678" required>
            </div>

            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Adresse Email</label>
                <input type="email" id="email" name="email" placeholder="exemple@gmail.com" required>
            </div>

            <!-- Adresse de livraison -->
            <div class="form-group">
                <label for="adresse"><i class="fas fa-map-marker-alt"></i> Adresse de livraison</label>
                <textarea id="adresse" name="adresse" placeholder="Votre adresse complète" required></textarea>
            </div>

            <!-- Mode de paiement -->
            <div class="form-group">
                <label for="paiement"><i class="fas fa-credit-card"></i> Mode de paiement</label>
                <select id="paiement" name="paiement" required>
                    <option value="">-- Sélectionnez un mode de paiement --</option>
                    <option value="a_livraison">Paiement à la livraison</option>
                    <option value="carte_bancaire">Carte bancaire</option>
                    <option value="virement">Virement bancaire</option>
                </select>
            </div>

            <!-- Bouton de soumission -->
            <button type="submit"><i class="fas fa-check-circle"></i> Confirmer la Commande</button>
        </form>
    </div>
</body>
</html>
